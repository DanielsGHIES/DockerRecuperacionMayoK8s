services:
  backend:
    build: ./backend
    container_name: music-reviews-backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: music_reviews
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_password
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: music-reviews-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: music_reviews
      POSTGRES_USER: music_user
      POSTGRES_PASSWORD: music_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data:
