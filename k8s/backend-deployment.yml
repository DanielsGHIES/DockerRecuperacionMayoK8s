apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: false
      # KICS: vulnerabilidad corregida: el pod no definia seccompProfile.
      # Configuracion anterior: sin securityContext de pod.
      # Vulnerabilidad existente en la version 2.c.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backend
          image: localhost:5000/music-reviews-backend:1.0
          imagePullPolicy: Always
          # KICS: vulnerabilidad corregida: contenedor sin restricciones explicitas de privilegios.
          # Configuracion anterior: no se indicaba runAsNonRoot, allowPrivilegeEscalation ni drop de capabilities.
          # Vulnerabilidad existente en la version 2.c.
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
